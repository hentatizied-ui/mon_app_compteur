workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: development
        bundle_identifier: com.hentatizied.monappcompteur
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          cd ios
          xcode-project build-ipa --workspace Runner.xcworkspace --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa